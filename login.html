<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Admin Login</title>
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <!-- 背景动画 -->
        <div class="bg-animation">
            <div class="gradient-sphere sphere-1"></div>
            <div class="gradient-sphere sphere-2"></div>
        </div>

        <!-- 登录卡片 -->
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-compass"></i>
                    <span>NavHub</span>
                </div>
                <h1>管理后台</h1>
                <p>请输入密码继续</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        密码
                    </label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="请输入管理密码"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group remember-me">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" checked>
                        <span class="checkmark"></span>
                        保持登录状态
                    </label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>登录</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    返回首页
                </a>
            </div>
        </div>

        <!-- 错误提示 -->
        <div class="toast" id="toast">
            <i class="fas fa-exclamation-circle"></i>
            <span id="toastMessage">密码错误</span>
        </div>
    </div>

    <script>
        // 配置 - 默认密码（生产环境应在服务器端验证）
        const ADMIN_PASSWORD = 'admin123';
        const SESSION_KEY = 'navhub_admin_session';
        const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24小时

        // 检查是否已登录
        function checkAuth() {
            const session = localStorage.getItem(SESSION_KEY);
            if (session) {
                const sessionData = JSON.parse(session);
                if (sessionData.expires > Date.now()) {
                    // 已登录，跳转到管理后台
                    window.location.href = 'admin.html';
                    return;
                } else {
                    // 会话过期，清除
                    localStorage.removeItem(SESSION_KEY);
                }
            }
        }

        // 页面加载时检查
        checkAuth();

        // DOM 元素
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const rememberMe = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // 切换密码显示
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // 显示错误提示
        function showToast(message, type = 'error') {
            toastMessage.textContent = message;
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 登录处理
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                showToast('请输入密码');
                passwordInput.focus();
                return;
            }

            // 显示加载状态
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 500));

            // 验证密码
            if (password === ADMIN_PASSWORD) {
                // 创建会话
                const sessionData = {
                    loggedIn: true,
                    expires: Date.now() + (rememberMe.checked ? SESSION_DURATION : 2 * 60 * 60 * 1000)
                };
                localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
                
                showToast('登录成功', 'success');
                
                // 跳转到管理后台
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 500);
            } else {
                showToast('密码错误，请重试');
                passwordInput.value = '';
                passwordInput.focus();
                
                // 恢复按钮
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>登录</span><i class="fas fa-arrow-right"></i>';
            }
        });

        // 回车提交
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
