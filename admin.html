<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Admin Dashboard</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-compass"></i>
                    <span>NavHub</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-label">主菜单</span>
                    <a href="#dashboard" class="nav-item active">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>仪表盘</span>
                    </a>
                    <a href="#websites" class="nav-item">
                        <i class="fas fa-globe"></i>
                        <span>网站管理</span>
                    </a>
                    <a href="#categories" class="nav-item">
                        <i class="fas fa-folder"></i>
                        <span>分类管理</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <span class="nav-label">设置</span>
                    <a href="#settings" class="nav-item">
                        <i class="fas fa-cog"></i>
                        <span>系统设置</span>
                    </a>
                    <a href="#appearance" class="nav-item">
                        <i class="fas fa-palette"></i>
                        <span>外观设置</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <a href="index.html" class="back-to-site">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回网站</span>
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索...">
                </div>
                
                <div class="top-bar-actions">
                    <button class="action-btn">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="action-btn">
                        <i class="fas fa-envelope"></i>
                    </button>
                    <div class="user-menu">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" alt="Admin" class="user-avatar">
                        <span class="user-name">管理员</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div class="page-content">
                <!-- 仪表盘 -->
                <section class="dashboard-section" id="dashboard">
                    <div class="page-header">
                        <h1>仪表盘</h1>
                        <p>欢迎回来，查看今日数据概览</p>
                    </div>
                    
                    <!-- 统计卡片 -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon blue">
                                <i class="fas fa-globe"></i>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value">142</span>
                                <span class="stat-label">网站总数</span>
                            </div>
                            <div class="stat-trend up">
                                <i class="fas fa-arrow-up"></i>
                                <span>+12%</span>
                            </div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-icon green">
                                <i class="fas fa-eye"></i>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value">8,542</span>
                                <span class="stat-label">今日访问</span>
                            </div>
                            <div class="stat-trend up">
                                <i class="fas fa-arrow-up"></i>
                                <span>+23%</span>
                            </div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-icon purple">
                                <i class="fas fa-folder"></i>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value">18</span>
                                <span class="stat-label">分类数量</span>
                            </div>
                            <div class="stat-trend neutral">
                                <i class="fas fa-minus"></i>
                                <span>0%</span>
                            </div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-icon orange">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value">1,234</span>
                                <span class="stat-label">用户数量</span>
                            </div>
                            <div class="stat-trend up">
                                <i class="fas fa-arrow-up"></i>
                                <span>+8%</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 快捷操作 -->
                    <div class="quick-actions">
                        <h3>快捷操作</h3>
                        <div class="action-buttons">
                            <button class="action-card" onclick="showAddModal()">
                                <i class="fas fa-plus"></i>
                                <span>添加网站</span>
                            </button>
                            <button class="action-card">
                                <i class="fas fa-folder-plus"></i>
                                <span>新建分类</span>
                            </button>
                            <button class="action-card">
                                <i class="fas fa-file-import"></i>
                                <span>批量导入</span>
                            </button>
                            <button class="action-card">
                                <i class="fas fa-chart-bar"></i>
                                <span>查看报表</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 最近添加 -->
                    <div class="recent-section">
                        <div class="section-header">
                            <h3>最近添加</h3>
                            <a href="#" class="view-all">查看全部</a>
                        </div>
                        <div class="data-table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>网站</th>
                                        <th>分类</th>
                                        <th>添加时间</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>
                                            <div class="website-info">
                                                <div class="website-icon">
                                                    <i class="fab fa-react"></i>
                                                </div>
                                                <div class="website-details">
                                                    <span class="website-name">React</span>
                                                    <span class="website-url">react.dev</span>
                                                </div>
                                            </div>
                                        </td>
                                        <td><span class="badge-tag">前端框架</span></td>
                                        <td>2026-05-31</td>
                                        <td><span class="status-badge active">已发布</span></td>
                                        <td>
                                            <div class="table-actions">
                                                <button class="icon-btn"><i class="fas fa-edit"></i></button>
                                                <button class="icon-btn"><i class="fas fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="website-info">
                                                <div class="website-icon">
                                                    <i class="fab fa-vuejs"></i>
                                                </div>
                                                <div class="website-details">
                                                    <span class="website-name">Vue.js</span>
                                                    <span class="website-url">vuejs.org</span>
                                                </div>
                                            </div>
                                        </td>
                                        <td><span class="badge-tag">前端框架</span></td>
                                        <td>2026-05-30</td>
                                        <td><span class="status-badge active">已发布</span></td>
                                        <td>
                                            <div class="table-actions">
                                                <button class="icon-btn"><i class="fas fa-edit"></i></button>
                                                <button class="icon-btn"><i class="fas fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="website-info">
                                                <div class="website-icon">
                                                    <i class="fab fa-angular"></i>
                                                </div>
                                                <div class="website-details">
                                                    <span class="website-name">Angular</span>
                                                    <span class="website-url">angular.io</span>
                                                </div>
                                            </div>
                                        </td>
                                        <td><span class="badge-tag">前端框架</span></td>
                                        <td>2026-05-29</td>
                                        <td><span class="status-badge pending">待审核</span></td>
                                        <td>
                                            <div class="table-actions">
                                                <button class="icon-btn"><i class="fas fa-edit"></i></button>
                                                <button class="icon-btn"><i class="fas fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- 添加网站模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-overlay" onclick="closeAddModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加新网站</h3>
                <button class="modal-close" onclick="closeAddModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form class="form">
                    <div class="form-group">
                        <label>网站名称</label>
                        <input type="text" placeholder="输入网站名称">
                    </div>
                    <div class="form-group">
                        <label>网站链接</label>
                        <input type="url" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label>选择分类</label>
                        <select>
                            <option>前端框架</option>
                            <option>开发工具</option>
                            <option>设计资源</option>
                            <option>学习平台</option>
                            <option>云服务</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea rows="3" placeholder="简短描述这个网站..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>图标</label>
                        <div class="icon-selector">
                            <button type="button" class="icon-option active">
                                <i class="fas fa-globe"></i>
                            </button>
                            <button type="button" class="icon-option">
                                <i class="fas fa-code"></i>
                            </button>
                            <button type="button" class="icon-option">
                                <i class="fas fa-paint-brush"></i>
                            </button>
                            <button type="button" class="icon-option">
                                <i class="fas fa-graduation-cap"></i>
                            </button>
                            <button type="button" class="icon-option">
                                <i class="fas fa-cloud"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary">添加网站</button>
            </div>
        </div>
    </div>

    <script>
        // 侧边栏切换
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');
        
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            const icon = sidebarToggle.querySelector('i');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
        });

        // 模态框控制
        function showAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        // 图标选择
        document.querySelectorAll('.icon-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
